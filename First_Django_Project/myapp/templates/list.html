{% extends "base.html" %}

{% block title %}{{ls.name}}{% endblock %}

{% block content %}
    <h1>{{ls.name}}</h1>
    <form method="post" action="">
        {% csrf_token %}
        {% for item in ls.item_set.all %}
            <div class="input-group mb-3">
                <div class="input-group-prepend">
                    <div class="input-group-text">
                        <button class="btn btn-outline-secondary border-0 padding-0 margin-0" type="submit" name="todo" value="{{item.id}}">View</button>
                        <input type="checkbox" value="clicked" name="c{{item.id}}"
                            {% if item.complete %}
                                checked
                            {% endif %}
                        >               
                    </div>
                </div>
                <input type="text", name="t{{item.id}}", value="{{item.text}}" class="form-control">
            </div>
        {% endfor %}

        <div class="input-group mb-3">
            <div class="input-group-prepend">
                <button type="submit" name="newItem" value="newItem" class="btn btn-success">Add To Do</button>
            </div>
            <input type="text" name="new">
        </div>
        <button type="submit" name="save" value="save" class="btn btn-success">Save</button>
    </form>
{% endblock %}

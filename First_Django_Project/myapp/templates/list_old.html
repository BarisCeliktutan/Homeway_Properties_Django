{% extends "base.html" %}

{% block title %}{{ls.name}}{% endblock %}


{% block content %}
    <h1>{{ls.name}}</h1>
    <form method="post" action="">
        {% csrf_token %}
        <ul>
            {% for item in ls.item_set.all %}
            <li><input type="checkbox" value="clicked" name="c{{item.id}}"
                {% if item.complete %}
                    checked
                {% endif %}
                >
                <button class="btn btn-outline-secondary border-0 padding-0 margin-0" type="submit" name="todo" value="{{item.id}}">{{item.text}}</button>
            </li>
            {% endfor %}
        </ul>
        <button type="submit" name="save" value="save">Save</button>
        <input type="text" name="new">
        <button type="submit" name="newItem" value="newItem">Add To Do</button>
    </form>
{% endblock %}

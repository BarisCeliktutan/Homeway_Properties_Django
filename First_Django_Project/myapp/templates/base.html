{% load static %}

<!doctype html>
<html>
    <head>
        <meta charset="uft-8">
        <meta name="viewpoint" content="width-device-width", initial-scale=1, shrink-to-fit="no">
        
        {% block icon %}
        {% endblock %}
        <link type="text/css" href="{% static 'base_style.css' %}" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
        
        <title>{% block title %}AsiasA{% endblock %}</title>
    </head>

    <body style="background-color:#111">
        <div class="sidenav">
            <a href="/homeway_property_ltd" style="color: rgba(20, 219, 245, 0.87);">Homeway Property LTD</a>
            <a href="/o_ses_turkiye" style="color: rgb(212, 11, 11);">O Ses Türkiye</a>
            <a href="/admin" style="color: rgb(11, 31, 212);">Admin</a>
            <a href="/home" style="color: rgba(85, 212, 11, 0.87);">Home</a>
            <a href="/todos" style="color: rgb(194, 146, 16);">Todos</a>
            <a href="/users" style="color: rgb(11, 132, 212);">Users</a>
            <a href="/create" style="color: rgb(212, 233, 23);">Create</a>
            <a href="/register" style="color: rgb(175, 108, 108);">Register</a>
            <a href="/me" style="color: rgb(111, 16, 148);">Myself</a>
        </div>

        <div id="content", name="content", class="main", style="color: rgb(145, 0, 0); background-color:rgba(10, 156, 156, 0.733)">
            <div class="row"> <!--class="row justify-content-center"-->
                <div class="main">
                    {% block h1 %}
                        <h1 class="mt-2">First Flutter Project</h1>
                    {% endblock %}
                    <hr class="mt-0 mb-4">
                    
                    <div style="color: rgb(22, 105, 19)">
                        {% block content %}
                        {% endblock %}
                    </div>
                </div>
            </div>
        </div>
        
        <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
  
    </body>
    <footer style="background-color: rgba(112, 90, 30, 0.315); text-align: center; position: fixed; bottom: 0; left: 0; width: 100%; padding: 10px;">
        {% block footer %}
        {% endblock %}
    </footer>
</html>
